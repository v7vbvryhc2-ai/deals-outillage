name: Scan Deals Outillage

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run deals scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python3 deals_outillage.py

      - name: Save seen deals
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add seen_deals.json || true
          git diff --staged --quiet || git commit -m "Update seen deals"
          git push || true
